<!DOCTYPE html>
<html>
<head>
    <title>SISTEMA DI SICUREZZA - ACCESSO NEGATO</title>
    <style>
        body { background: black; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .warning { color: red; font-weight: bold; font-size: 24px; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 0; } 100% { opacity: 1; } }
        .info { border: 1px solid #0f0; display: inline-block; padding: 20px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

    <div class="warning">ATTENZIONE: ACCESSO NON AUTORIZZATO</div>
    <p>Tentativo di intrusione rilevato da parte di: <strong>FRANCESCO STABILE</strong></p>
    
    <div class="info" id="data-box">
        > ANALISI DISPOSITIVO IN CORSO...<br>
        <span id="details"></span>
    </div>

    <script>
        // Questo script legge i dati del browser di Francesco e glieli sbatte in faccia
        const details = document.getElementById('details');
        
        setTimeout(() => {
            details.innerHTML += "> IP RILEVATO: 192.***.***.** (Localizzato)<br>";
        }, 1000);

        setTimeout(() => {
            details.innerHTML += "> DISPOSITIVO: " + navigator.platform + "<br>";
            details.innerHTML += "> BROWSER: " + navigator.userAgent.split(' ')[0] + "<br>";
            details.innerHTML += "> ORA LOCALE: " + new Date().toLocaleTimeString() + "<br>";
            details.innerHTML += "<br><strong style='color:red'>> LOG INVIATO AL SERVER DI MIKE.</strong>";
            document.body.style.boxShadow = "inset 0 0 100px red";
        }, 2500);
    </script>
</body>
</html>
